<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker - Login</title>
  <link rel="stylesheet" href="https://necolas.github.io/normalize.css/8.0.1/normalize.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1 class="logo">💰 ExpenseTracker</h1>
      <p class="tagline">Take control of your finances</p>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('login')">Login</button>
        <button class="tab-btn" onclick="showTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login" class="form-section active">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="Enter your email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password"/>
        </div>
        <button class="btn-primary" onclick="login()">Login</button>
        <p id="login-error" class="error-msg"></p>
      </div>

      <!-- Register Form -->
      <div id="register" class="form-section">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Choose a username"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="Enter your email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Choose a password"/>
        </div>
        <button class="btn-primary" onclick="register()">Create Account</button>
        <p id="reg-error" class="error-msg"></p>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
