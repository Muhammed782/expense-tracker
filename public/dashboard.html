<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker - Dashboard</title>
  <link rel="stylesheet" href="https://necolas.github.io/normalize.css/8.0.1/normalize.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <h1 class="logo">💰 ExpenseTracker</h1>
    <div class="nav-right">
      <span id="welcome-msg"></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-container">
    <!-- Summary Cards -->
    <div class="summary-cards">
      <div class="card balance">
        <p>Total Balance</p>
        <h2 id="balance">$0.00</h2>
      </div>
      <div class="card income">
        <p>Total Income</p>
        <h2 id="total-income">$0.00</h2>
      </div>
      <div class="card expense">
        <p>Total Expenses</p>
        <h2 id="total-expenses">$0.00</h2>
      </div>
    </div>

    <div class="main-content">
      <!-- Add Transaction Form -->
      <div class="form-card">
        <h3>Add Transaction</h3>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="title" placeholder="e.g. Monthly Salary"/>
        </div>
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" id="amount" placeholder="0.00"/>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option value="salary">Salary</option>
            <option value="food">Food</option>
            <option value="transport">Transport</option>
            <option value="entertainment">Entertainment</option>
            <option value="health">Health</option>
            <option value="shopping">Shopping</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Description (optional)</label>
          <input type="text" id="description" placeholder="Add a note..."/>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="date"/>
        </div>
        <button class="btn-primary" onclick="addExpense()">Add Transaction</button>
        <p id="form-error" class="error-msg"></p>
      </div>

      <!-- Transaction List -->
      <div class="transactions-card">
        <h3>Recent Transactions</h3>
        <div id="transactions-list">
          <p class="empty-msg">No transactions yet. Add one!</p>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
